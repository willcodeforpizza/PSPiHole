name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install module dependencies
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.7.0 -Scope CurrentUser -Force -SkipPublisherCheck
          Install-Module PSScriptAnalyzer, InvokeBuild, powershell-yaml -Scope CurrentUser -Force

      - name: Run Validate
        shell: pwsh
        run: |
          Invoke-Build Validate
